# Publish to GitHub Packages when a release is published.
# Docs: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pnyx
    steps:
      - uses: actions/checkout@v4
        with:
          path: pnyx
      - uses: actions/checkout@v4
        with:
          repository: jayavibhavnk/AgentFuse---ACP
          path: agentfuse
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pnyx/package-lock.json
      - name: Build Agentfuse (devDependency is file:../agentfuse)
        run: cd ../agentfuse && npm ci && npm run build
      - run: npm ci
      - run: npm run verify

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: pnyx
    steps:
      - uses: actions/checkout@v4
        with:
          path: pnyx
      - uses: actions/checkout@v4
        with:
          repository: jayavibhavnk/AgentFuse---ACP
          path: agentfuse
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pnyx/package-lock.json
          registry-url: https://npm.pkg.github.com/
      - name: Build Agentfuse (devDependency is file:../agentfuse)
        run: cd ../agentfuse && npm ci && npm run build
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
